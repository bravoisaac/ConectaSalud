<ion-content class="feed-content" [fullscreen]="true">
  <div class="feed-shell">
    <header class="feed-header">
      <div class="feed-header-inner">
        <h1 class="feed-title">Chats</h1>
        <p class="feed-subtitle">Conversaciones</p>
      </div>
    </header>

    <section class="feed-body" aria-label="Chats">
      <ion-text color="danger" *ngIf="errorMsg">{{ errorMsg }}</ion-text>
      <ion-text color="success" *ngIf="successMsg">{{ successMsg }}</ion-text>

      <app-loading-state
        *ngIf="loading"
        title="Cargando chats"
        description="Sincronizando tus conversaciones recientes."
      ></app-loading-state>

      <app-empty-state
        *ngIf="!loading && !chats.length"
        icon="chatbubbles-outline"
        title="Todavia no hay chats"
        description="Las conversaciones se crean automaticamente cuando una reserva aceptada habilita el contacto."
      >
        <div empty-actions>
          <ion-button routerLink="/app/health">
            <ion-icon slot="start" name="medkit-outline" aria-hidden="true"></ion-icon>
            Buscar profesional
          </ion-button>
          <ion-button routerLink="/app/health-bookings" fill="outline">
            <ion-icon slot="start" name="calendar-outline" aria-hidden="true"></ion-icon>
            Ver reservas
          </ion-button>
        </div>
      </app-empty-state>

      <div class="chat-layout" *ngIf="!loading && chats.length">
        <div class="chat-list">
          <ion-card *ngFor="let chat of chats" class="chat-card" button="true" (click)="openChat(chat)">
            <ion-card-content>
              <div class="chat-card-title">{{ chatTitle(chat) }}</div>
              <div class="chat-card-message">{{ lastMessage(chat) }}</div>
            </ion-card-content>
          </ion-card>
        </div>

        <ion-card class="chat-detail" *ngIf="selectedChat">
          <ion-card-header>
            <div class="chat-detail-head">
              <ion-card-title>{{ chatTitle(selectedChat) }}</ion-card-title>
              <ion-button size="small" fill="clear" (click)="closeChat()">
                <ion-icon slot="icon-only" name="close-outline" aria-label="Cerrar"></ion-icon>
              </ion-button>
            </div>
          </ion-card-header>
          <ion-card-content>
            <div class="messages">
              <div
                class="message"
                *ngFor="let message of selectedChat.messages || []"
                [ngClass]="{ 'message--own': isOwnMessage(message) }"
              >
                <div class="message-sender">{{ messageSender(message) }}</div>
                <div class="message-body">{{ message.body }}</div>
              </div>
            </div>

            <form class="message-form" (ngSubmit)="sendMessage()">
              <ion-input
                name="messageBody"
                [(ngModel)]="messageBody"
                placeholder="Escribe un mensaje"
                [disabled]="sending"
              ></ion-input>
              <ion-button type="submit" [disabled]="sending || !messageBody.trim()">
                <ion-icon slot="icon-only" name="send-outline" aria-label="Enviar"></ion-icon>
              </ion-button>
            </form>
          </ion-card-content>
        </ion-card>
      </div>
    </section>
  </div>
</ion-content>
