<ion-content class="auth-content" [fullscreen]="true">
  <div class="auth-shell">
    <header class="auth-top">
      <div class="auth-top-inner">
        <h1 class="auth-title">Recuperar cuenta</h1>
        <p class="auth-subtitle">Solicita un enlace seguro</p>
      </div>
    </header>

    <section class="auth-card" aria-label="Formulario de recuperacion">
      <form (ngSubmit)="submit()" novalidate>
        <div class="field">
          <label class="field-label" for="forgot-email">Correo electronico</label>
          <ion-item class="auth-item" lines="none">
            <ion-input
              id="forgot-email"
              name="email"
              [(ngModel)]="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="usuario@email.com"
              required
            ></ion-input>
          </ion-item>
        </div>

        <ion-button class="primary" expand="block" type="submit" [disabled]="loading">
          {{ loading ? 'Enviando...' : 'Enviar enlace' }}
        </ion-button>

        <p class="success" *ngIf="successMsg">{{ successMsg }}</p>
        <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

        <div class="hint" *ngIf="!successMsg && !errorMsg">
          <ion-icon name="shield-checkmark-outline" aria-hidden="true"></ion-icon>
          <span>Por seguridad, no confirmamos si el correo esta registrado.</span>
        </div>

        <ion-button class="link" fill="clear" routerLink="/login" type="button">
          Volver al login
        </ion-button>
      </form>
    </section>
  </div>
</ion-content>
