<ion-header>
  <ion-toolbar>
    <ion-title>Servicios de salud</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Nueva reserva</ion-card-title>
      <ion-card-subtitle>Duracion estandar: 60 min</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label>Profesional</ion-label>
        <ion-select [(ngModel)]="bookingProfileId">
          <ion-select-option *ngFor="let profile of profiles" [value]="profile.id">
            {{ profile.specialty }} ? {{ profile.user_id }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label>Inicio</ion-label>
        <ion-datetime presentation="date-time" [(ngModel)]="bookingStart"></ion-datetime>
      </ion-item>

      <ion-item>
        <ion-label>Fin (opcional)</ion-label>
        <ion-datetime presentation="date-time" [(ngModel)]="bookingEnd"></ion-datetime>
      </ion-item>

      <ion-button expand="block" (click)="createBooking()">Crear reserva</ion-button>
      <ion-text color="success" *ngIf="successMsg">{{ successMsg }}</ion-text>
      <ion-text color="danger" *ngIf="errorMsg">{{ errorMsg }}</ion-text>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-list-header>
      <ion-label>Profesionales disponibles</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let specialist of profiles">
      <ion-label>
        <h2>{{ specialist.specialty }}</h2>
        <p>Tarifa: {{ specialist.rate_hour || 0 }} CLP</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="loading">
    <ion-label>Cargando...</ion-label>
  </ion-item>
</ion-content>
