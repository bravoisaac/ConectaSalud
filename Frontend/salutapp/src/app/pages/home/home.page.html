<ion-header>
  <ion-toolbar>
    <ion-title>Servicios / Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Nuevo registro</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-input
          label="Nombre"
          labelPlacement="floating"
          [(ngModel)]="nuevo.name"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-textarea
          label="Descripcion"
          labelPlacement="floating"
          [(ngModel)]="nuevo.description"
        ></ion-textarea>
      </ion-item>

      <ion-item>
        <ion-input
          type="number"
          label="Precio"
          labelPlacement="floating"
          [(ngModel)]="nuevo.price"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          type="date"
          label="Fecha"
          labelPlacement="stacked"
          [(ngModel)]="nuevo.fecha"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-select
          label="Aprobacion"
          labelPlacement="stacked"
          [(ngModel)]="nuevo.estado_aprobacion"
        >
          <ion-select-option value="pendiente">Pendiente</ion-select-option>
          <ion-select-option value="aprobado">Aprobado</ion-select-option>
          <ion-select-option value="rechazado">Rechazado</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-select
          label="Proceso"
          labelPlacement="stacked"
          [(ngModel)]="nuevo.estado_proceso"
        >
          <ion-select-option value="en_proceso">En proceso</ion-select-option>
          <ion-select-option value="confirmado">Confirmado</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button expand="block" (click)="crearRegistro()" [disabled]="saving">
        Guardar
      </ion-button>

      <ion-text color="danger" *ngIf="errorMsg">{{ errorMsg }}</ion-text>
    </ion-card-content>
  </ion-card>

  <ion-list *ngIf="products.length">
    <ion-item *ngFor="let p of products">
      <ion-label>
        <h2>{{ p.name }} - {{ p.price | currency:'CLP':'symbol-narrow' }}</h2>
        <p>
          {{ p.description }}<br>
          Fecha: {{ p.fecha }}<br>
          Aprobacion: <strong>{{ p.estado_aprobacion }}</strong><br>
          Proceso: <strong>{{ p.estado_proceso }}</strong>
        </p>
      </ion-label>
    </ion-item>
  </ion-list>

  <app-empty-state
    *ngIf="!products.length && !loadingList"
    icon="cube-outline"
    title="No hay registros todavia"
    description="Los servicios o productos creados apareceran en este listado."
  ></app-empty-state>

  <app-loading-state
    *ngIf="loadingList"
    title="Cargando registros"
    description="Preparando servicios y productos."
  ></app-loading-state>
</ion-content>
