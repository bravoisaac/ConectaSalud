<ion-content class="auth-content" [fullscreen]="true">
  <div class="auth-shell">
    <header class="auth-top">
      <div class="auth-top-inner">
        <h1 class="auth-title">Bienvenido</h1>
        <p class="auth-subtitle">Accede a tu cuenta</p>
      </div>
    </header>

    <section class="auth-card" aria-label="Formulario de login">
      <form (ngSubmit)="submit()" novalidate>
        <div class="field">
          <label class="field-label" for="login-email">Correo electrónico</label>
          <ion-item class="auth-item" lines="none">
            <ion-input
              id="login-email"
              name="email"
              [(ngModel)]="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="usuario@email.com"
            ></ion-input>
          </ion-item>
        </div>

        <div class="field">
          <label class="field-label" for="login-password">Contraseña</label>
          <ion-item class="auth-item" lines="none">
            <ion-input
              id="login-password"
              name="password"
              [(ngModel)]="password"
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="current-password"
              placeholder="••••••••"
            ></ion-input>
            <ion-button
              class="eye-btn"
              fill="clear"
              size="small"
              type="button"
              aria-label="Mostrar u ocultar contraseña"
              (click)="togglePassword()"
            >
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </ion-item>
        </div>

        <label class="remember-option">
          <ion-checkbox
            name="rememberMe"
            [checked]="rememberMe"
            (ionChange)="rememberMe = $event.detail.checked"
            justify="start"
            labelPlacement="end"
          >
            Recordarme
          </ion-checkbox>
        </label>

        <ion-button class="primary" expand="block" type="submit" [disabled]="loading">
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </ion-button>

        <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

        <div class="cta">
          <p class="cta-text">¿No tienes cuenta?</p>
          <ion-button class="secondary" expand="block" fill="outline" routerLink="/register" type="button">
            Crear cuenta
          </ion-button>
        </div>
      </form>
    </section>
  </div>
</ion-content>
