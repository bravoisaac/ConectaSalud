<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input [(ngModel)]="email" type="email"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label position="floating">Contrasena</ion-label>
    <ion-input [(ngModel)]="password" type="password"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="submit()" [disabled]="loading">
    {{ loading ? 'Entrando...' : 'Entrar' }}
  </ion-button>

  <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

  <ion-button fill="clear" routerLink="/register">Crear cuenta</ion-button>
</ion-content>
