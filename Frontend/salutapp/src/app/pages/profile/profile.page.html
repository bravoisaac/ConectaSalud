<ion-header>
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ user?.name || 'Usuario' }}</ion-card-title>
      <ion-card-subtitle>Rol: {{ user?.role || 'user' }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <p>Idioma: {{ user?.locale || 'es' }}</p>
      <ion-button expand="block" fill="outline">Verificacion</ion-button>
      <ion-button expand="block">Editar perfil</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-item *ngIf="isAdmin" button routerLink="/admin">
      <ion-label>Panel admin</ion-label>
    </ion-item>
    <ion-item button>
      <ion-label>Configuracion</ion-label>
    </ion-item>
    <ion-item button (click)="logout()">
      <ion-label>Cerrar sesion</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
