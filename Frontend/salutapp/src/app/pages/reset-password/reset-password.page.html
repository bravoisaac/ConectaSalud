<ion-content class="auth-content" [fullscreen]="true">
  <div class="auth-shell">
    <header class="auth-top">
      <div class="auth-top-inner">
        <h1 class="auth-title">Nueva contrasena</h1>
        <p class="auth-subtitle">Protege el acceso a tu cuenta</p>
      </div>
    </header>

    <section class="auth-card" aria-label="Formulario para nueva contrasena">
      <form (ngSubmit)="submit()" novalidate>
        <div class="field">
          <label class="field-label" for="reset-email">Correo electronico</label>
          <ion-item class="auth-item" lines="none">
            <ion-input
              id="reset-email"
              name="email"
              [(ngModel)]="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              readonly
            ></ion-input>
          </ion-item>
        </div>

        <div class="field">
          <label class="field-label" for="reset-password">Nueva contrasena</label>
          <ion-item class="auth-item" lines="none">
            <ion-input
              id="reset-password"
              name="password"
              [(ngModel)]="password"
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="new-password"
              placeholder="Minimo 8 caracteres"
              required
            ></ion-input>
            <ion-button
              class="eye-btn"
              fill="clear"
              size="small"
              type="button"
              aria-label="Mostrar u ocultar contrasena"
              (click)="togglePassword()"
            >
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </ion-item>
        </div>

        <div class="field">
          <label class="field-label" for="reset-password-confirmation">Confirmar contrasena</label>
          <ion-item class="auth-item" lines="none">
            <ion-input
              id="reset-password-confirmation"
              name="passwordConfirmation"
              [(ngModel)]="passwordConfirmation"
              [type]="showPasswordConfirmation ? 'text' : 'password'"
              autocomplete="new-password"
              placeholder="Repite la contrasena"
              required
            ></ion-input>
            <ion-button
              class="eye-btn"
              fill="clear"
              size="small"
              type="button"
              aria-label="Mostrar u ocultar confirmacion"
              (click)="togglePasswordConfirmation()"
            >
              <ion-icon [name]="showPasswordConfirmation ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </ion-item>
        </div>

        <ion-button class="primary" expand="block" type="submit" [disabled]="loading || !email || !token">
          {{ loading ? 'Actualizando...' : 'Actualizar contrasena' }}
        </ion-button>

        <p class="success" *ngIf="successMsg">{{ successMsg }}</p>
        <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

        <div class="hint" *ngIf="!successMsg && !errorMsg">
          <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
          <span>Usa al menos 8 caracteres con letras y numeros.</span>
        </div>

        <ion-button class="link" fill="clear" routerLink="/login" type="button">
          Ir al login
        </ion-button>
      </form>
    </section>
  </div>
</ion-content>
