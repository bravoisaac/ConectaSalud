<section class="loading-state" [class.loading-state--compact]="compact" role="status" aria-live="polite">
  <div class="loading-state__spinner" aria-hidden="true">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div class="loading-state__copy">
    <h2>{{ title }}</h2>
    <p *ngIf="description">{{ description }}</p>
  </div>

  <div class="loading-state__bar" aria-hidden="true">
    <span></span>
  </div>
</section>
