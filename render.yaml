services:
  # Backend API (Laravel)
  - type: web
    name: salut-api
    runtime: docker
    rootDir: Backend/api
    dockerfilePath: Backend/api/Dockerfile
    dockerContext: Backend/api
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Salut
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

  # Frontend (Ionic/Angular) as static site
  - type: web
    name: salut-web
    runtime: static
    rootDir: Frontend/salutapp
    buildCommand: npm ci && npm run build
    staticPublishPath: www
    envVars:
      - key: NODE_VERSION
        value: "22"
    routes:
      # SPA fallback (Angular router)
      - type: rewrite
        source: "/*"
        destination: /index.html
